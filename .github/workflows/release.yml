name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all targets
        run: |
          set -euxo pipefail
          mkdir -p dist

          # Bun cross-compiles to any supported target from any host.
          bun build src/index.ts --compile --target=bun-darwin-arm64  --outfile dist/wan-darwin-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64    --outfile dist/wan-darwin-x64
          bun build src/index.ts --compile --target=bun-linux-x64     --outfile dist/wan-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64   --outfile dist/wan-linux-arm64
          bun build src/index.ts --compile --target=bun-windows-x64   --outfile dist/wan-windows-x64.exe

          ls -la dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
