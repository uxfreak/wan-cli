name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-darwin-arm64:
    name: Build darwin arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned: 1.3.12 has a code-signing regression on darwin-arm64
          # (truncated LC_CODE_SIGNATURE → SIGKILL on launch).
          # See https://github.com/oven-sh/bun/issues/29120
          bun-version: "1.3.11"
      - name: Build
        run: |
          mkdir -p dist
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/wan-darwin-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: wan-darwin-arm64
          path: dist/wan-darwin-arm64
          if-no-files-found: error

  # darwin-x64 (Intel Macs) is not yet shipped — the free-tier macos-13
  # runner queue was unreliably slow, blocking releases. Revisit once
  # Apple Silicon coverage is verified and we have signing automated.
  # build-darwin-x64:
  #   runs-on: macos-13
  #   ...

  build-linux-windows:
    name: Build linux + windows (cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned: 1.3.12 has a code-signing regression on darwin-arm64
          # (truncated LC_CODE_SIGNATURE → SIGKILL on launch).
          # See https://github.com/oven-sh/bun/issues/29120
          bun-version: "1.3.11"
      - name: Build
        run: |
          set -euxo pipefail
          mkdir -p dist
          bun build src/index.ts --compile --target=bun-linux-x64     --outfile dist/wan-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64   --outfile dist/wan-linux-arm64
          bun build src/index.ts --compile --target=bun-windows-x64   --outfile dist/wan-windows-x64.exe
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-darwin-arm64, build-linux-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
